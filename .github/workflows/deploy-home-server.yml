name: Deploy Home Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: at-fan-home-server
  cancel-in-progress: true

env:
  APP_PARENT: /home/pilt/service/apps
  APP_DIR: /home/pilt/service/apps/at-fan
  REPO_URL: https://github.com/${{ github.repository }}.git
  BRANCH: main

jobs:
  deploy:
    name: Deploy on qoweh self-hosted runner
    # If there are multiple self-hosted runners, add the server-specific label here.
    runs-on: self-hosted
    steps:
      - name: Check server tools
        run: |
          set -eu
          hostname
          git --version
          docker --version
          docker compose version

      - name: Clone or update source
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -eu
          mkdir -p "$APP_PARENT"
          GIT_AUTH_HEADER="AUTHORIZATION: bearer $GITHUB_TOKEN"

          if [ -e "$APP_DIR" ] && [ ! -d "$APP_DIR/.git" ]; then
            echo "$APP_DIR exists but is not a git repository."
            exit 1
          fi

          if [ ! -d "$APP_DIR/.git" ]; then
            git -c http.extraheader="$GIT_AUTH_HEADER" clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
          fi

          cd "$APP_DIR"
          git remote set-url origin "$REPO_URL"
          git -c http.extraheader="$GIT_AUTH_HEADER" fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git -c http.extraheader="$GIT_AUTH_HEADER" pull --ff-only origin "$BRANCH"

      - name: Deploy compose stack
        run: |
          set -eu
          cd "$APP_DIR"
          docker compose up -d --build
          docker compose ps
