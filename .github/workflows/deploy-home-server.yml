# This repo does not own the qoweh-server self-hosted runner.
# It asks qoweh/home-server to run its deploy workflow.
name: Request Home Server Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: at-fan-home-server-workflow-dispatch
  cancel-in-progress: true

jobs:
  request-deploy:
    name: Request qoweh/home-server deploy
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch home-server workflow
        env:
          HOME_SERVER_DISPATCH_TOKEN: ${{ secrets.HOME_SERVER_DISPATCH_TOKEN }}
          TARGET_REPO: qoweh/home-server
          TARGET_WORKFLOW: at-fan-deploy.yml
          TARGET_REF: main
        run: |
          set -euo pipefail

          if [ -z "${HOME_SERVER_DISPATCH_TOKEN}" ]; then
            echo "HOME_SERVER_DISPATCH_TOKEN secret is required."
            echo "Create a fine-grained GitHub token with write access to qoweh/home-server actions."
            exit 1
          fi

          cat > payload.json <<EOF
          {
            "ref": "${TARGET_REF}"
          }
          EOF

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${HOME_SERVER_DISPATCH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET_REPO}/actions/workflows/${TARGET_WORKFLOW}/dispatches" \
            --data @payload.json
