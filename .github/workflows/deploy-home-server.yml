name: Deploy Home Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOME_SERVER_HOST }}
          username: ${{ secrets.HOME_SERVER_USER }}
          key: ${{ secrets.HOME_SERVER_SSH_KEY }}
          port: ${{ secrets.HOME_SERVER_SSH_PORT || 22 }}
          script: |
            set -eu
            APP_DIR="${{ secrets.HOME_SERVER_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/apps/at-fan"
            fi
            REPO_URL="https://github.com/qoweh/at-fan.git"
            BRANCH="main"

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$(dirname "$APP_DIR")"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"
            docker compose up -d --build
